apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sparky-secrets
  namespace: sparky
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: sparky-secrets
  data:
    # Generar con: openssl rand -hex 32
    - secretKey: SPARKY_FITNESS_API_ENCRYPTION_KEY
      remoteRef:
        key: /sparky/SPARKY_FITNESS_API_ENCRYPTION_KEY
    # Generar con: openssl rand -base64 32
    - secretKey: BETTER_AUTH_SECRET
      remoteRef:
        key: /sparky/BETTER_AUTH_SECRET
---
# Credenciales de la DB que vive en el cluster "data" (mismas keys de
# Infisical que usa databases/data/sparky, replicadas en gordito)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sparky-db-credentials
  namespace: sparky
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: sparky-db-credentials
  data:
    - secretKey: username
      remoteRef:
        key: /databases/sparky/SPARKY_DB_USER
    - secretKey: password
      remoteRef:
        key: /databases/sparky/SPARKY_DB_PASSWORD
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sparky-app-db-credentials
  namespace: sparky
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: sparky-app-db-credentials
    template:
      data:
        # Debe coincidir con managed.roles[].name en databases/data/sparky
        username: sparkyapp
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: /databases/sparky/SPARKY_APP_DB_PASSWORD
