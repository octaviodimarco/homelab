apiVersion: v1
kind: Service
metadata:
  name: kasm-svc
  namespace: kasm
spec:
  ports:
    - name: https
      protocol: TCP
      port: 443
      targetPort: 443
  type: ClusterIP
  # No selector - se usa con Endpoints manual
---
apiVersion: v1
kind: Endpoints
metadata:
  name: kasm-svc
  namespace: kasm
subsets:
  - addresses:
      - ip: 192.168.1.193
    ports:
      - name: https
        port: 443
        protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kasm-ingress
  namespace: kasm
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-production"
    external-dns.kubernetes.io/ignore: "true"
    # Configuraciones para proxy HTTPS backend
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    # Deshabilitar verificación de certificado del backend (Kasm usa cert autofirmado)
    nginx.ingress.kubernetes.io/proxy-ssl-verify: "false"
    # Timeouts extendidos para sesiones de escritorio remoto
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    # WebSocket support (Kasm requiere WebSockets para streaming)
    nginx.ingress.kubernetes.io/websocket-services: "kasm-svc"
    # Headers para reverse proxy
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
    # Proxy body size ilimitado para subir archivos
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
spec:
  ingressClassName: nginx
  rules:
    - host: "kasm.dimarco-server.site"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kasm-svc
                port:
                  name: https
  tls:
    - hosts:
        - "kasm.dimarco-server.site"
      secretName: kasm-tls





