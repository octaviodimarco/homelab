# --- Volumen para la LIBRERÍA DE MEDIA (datos existentes) ---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyfin-media-pv
spec:
  storageClassName: ""
  capacity:
    storage: 10Ti
  accessModes:
    - ReadWriteMany
  # Keep these options identical across every PV of this NFS export:
  # mounts of the same export share the kernel superblock, so the first
  # mount's options win on each node.
  mountOptions:
    - nfsvers=4
    - noatime
    - nconnect=8
  nfs:
    server: 192.168.1.79
    path: "/volume1/Proxmox/Media"
    readOnly: false
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-media-pvc
spec:
  storageClassName: ""
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Ti
  volumeName: jellyfin-media-pv
---
# --- Volumen para la CONFIGURACIÓN de Jellyfin (datos nuevos) ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-config-pvc
spec:
  storageClassName: nfs-csi
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
