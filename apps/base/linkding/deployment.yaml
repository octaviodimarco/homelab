apiVersion: apps/v1
kind: Deployment
metadata:
  name: linkding
  # labels:
  #   app: linkding
spec:
  # Recreate: la data es SQLite en NFS con local_lock — nunca debe
  # haber dos pods con la DB abierta a la vez
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: linkding
  template:
    metadata:
      labels:
        app: linkding
    spec:
      # securityContext:
      #   fsGroup: 1000
      containers:
        - name: linkding
          image: sissbruecker/linkding:1.45.0
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: data
              mountPath: /etc/linkding/data
          envFrom:
            - configMapRef:
                name: linkding-config-postgres
            - secretRef:
                name: linkding-db-secret
          resources:
            requests:
              memory: "240Mi"
              cpu: "15m"
            limits:
              memory: "480Mi"
              cpu: "50m"
      restartPolicy: Always
      volumes:
        - name: data
          emptyDir: {}
