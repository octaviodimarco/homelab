apiVersion: apps/v1
kind: Deployment
metadata:
  name: memos
spec:
  # Recreate: la data es SQLite en NFS con local_lock — nunca debe
  # haber dos pods con la DB abierta a la vez
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: memos
  template:
    metadata:
      labels:
        app: memos
    spec:
      securityContext:
        # Usamos un usuario no-root para mayor seguridad
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: memos
          image: neosmemo/memos:0.29.1
          env:
            - name: MEMOS_PORT
              value: "5230"
          envFrom:
            - secretRef:
                name: memos-db-secret

          ports:
            - containerPort: 5230 # El puerto que usa Memos por defecto
              name: http

          resources:
            requests:
              memory: "112Mi"
              cpu: "15m"
            limits:
              memory: "224Mi"
              cpu: "50m"

          volumeMounts:
            # Memos necesita un volumen para guardar activos (como imágenes)
            - mountPath: /var/opt/memos
              name: data

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: memos-data-pvc
