apiVersion: v1
kind: PersistentVolume
metadata:
  name: immich-library-pv
spec:
  storageClassName: ""
  capacity:
    storage: 2Ti
  accessModes:
    - ReadWriteMany
  # Keep these options identical across every PV of this NFS export:
  # mounts of the same export share the kernel superblock, so the first
  # mount's options win on each node.
  mountOptions:
    - nfsvers=4
    - noatime
    - nconnect=8
  nfs:
    server: 192.168.1.79
    path: "/volume1/Proxmox/Media/immich"
    readOnly: false
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-library-pvc
spec:
  storageClassName: ""
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 2Ti
  volumeName: immich-library-pv
