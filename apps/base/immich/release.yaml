apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  interval: 30m
  chart:
    spec:
      chart: immich
      version: "0.13.1"
      sourceRef:
        kind: HelmRepository
        name: immich
        namespace: immich
      interval: 12h

  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/immich-app/immich-server
              tag: v3.0.0
            env:
              DB_HOSTNAME: pg-immich.data.dimarco-server.site
              DB_PORT: "5432"
              DB_DATABASE_NAME: immich
              DB_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-db-credentials
                    key: DB_USERNAME
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: immich-db-credentials
                    key: DB_PASSWORD
              REDIS_HOSTNAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-db-credentials
                    key: REDIS_HOSTNAME
              REDIS_PORT:
                valueFrom:
                  secretKeyRef:
                    name: immich-db-credentials
                    key: REDIS_PORT
              IMMICH_MACHINE_LEARNING_ENABLED: "false"
            resources:
              requests:
                memory: 512Mi
                cpu: 250m
              limits:
                memory: 1.5Gi
                cpu: 1000m

        replicaCount: 1

    server:
      enabled: true
      ingress:
        main:
          enabled: true
          className: nginx
          annotations:
            cert-manager.io/cluster-issuer: letsencrypt-production
            external-dns.kubernetes.io/ignore: "true"
            nginx.ingress.kubernetes.io/proxy-body-size: "0"
            nginx.ingress.kubernetes.io/proxy-connect-timeout: "3600"
            nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
            nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
          hosts:
            - host: immich.dimarco-server.site
              paths:
                - path: /
                  pathType: Prefix
          tls:
            - hosts:
                - immich.dimarco-server.site
              secretName: immich-tls

    machine-learning:
      enabled: false

    valkey:
      enabled: false

    immich:
      persistence:
        library:
          existingClaim: immich-library-pvc
