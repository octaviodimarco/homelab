apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-db-credentials
  namespace: immich
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: immich-db-credentials
  data:
    - secretKey: username
      remoteRef:
        key: /databases/immich/IMMICH_DB_USER
    - secretKey: password
      remoteRef:
        key: /databases/immich/IMMICH_DB_PASSWORD
