apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sparky-db-credentials
  namespace: sparky
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: sparky-db-credentials
  data:
    - secretKey: username
      remoteRef:
        key: /databases/sparky/SPARKY_DB_USER
    - secretKey: password
      remoteRef:
        key: /databases/sparky/SPARKY_DB_PASSWORD
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sparky-app-db-credentials
  namespace: sparky
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: sparky-app-db-credentials
    template:
      # CNPG (managed.roles) espera un secret de tipo basic-auth
      type: kubernetes.io/basic-auth
      data:
        # Debe coincidir con managed.roles[].name en database.yaml
        username: sparkyapp
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: /databases/sparky/SPARKY_APP_DB_PASSWORD
