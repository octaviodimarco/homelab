apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 5m
  chart:
    spec:
      chart: traefik
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
      version: "41.0.2" # Traefik v3.7.6
  values:
    deployment:
      replicas: 3

    # Force traefik to run only on networking node
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: kubernetes.io/hostname
                  operator: In
                  values:
                    - k3s-nixos-networking-worker

    # Mismo patron que nginx: corre en el nodo de networking via toleration
    tolerations:
      - key: networking-only
        operator: Equal
        value: "true"
        effect: NoSchedule
      - key: networking-only
        operator: Equal
        value: "true"
        effect: NoExecute

    service:
      spec:
        # IP publica del router port-forward, tomada de nginx en el cutover
        loadBalancerIP: 192.168.1.240

    ports:
      web:
        # Redirect global 80 -> 443 (nginx lo hacia por defecto con TLS)
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
              permanent: true
      websecure:
        transport:
          respondingTimeouts:
            # El default de v3 (60s) corta uploads largos (immich) y
            # streams (jellyfin); espeja el proxy-*-timeout 3600 de nginx
            readTimeout: 3600
            idleTimeout: 3600

    ingressClass:
      enabled: true
      # nginx sigue siendo la class por defecto implicita durante la migracion
      isDefaultClass: false

    providers:
      kubernetesIngress:
        enabled: true
        # Publica la IP del LB en el status de los Ingress
        publishedService:
          enabled: true

    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "500m"
