apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: goldilocks
  namespace: goldilocks
spec:
  interval: 30m
  chart:
    spec:
      chart: goldilocks
      version: "10.3.0"
      sourceRef:
        kind: HelmRepository
        name: fairwinds-stable
        namespace: goldilocks
      interval: 12h
  install:
    crds: Create
  upgrade:
    crds: CreateReplace

  values:
    vpa:
      enabled: true
      updater:
        enabled: false

    metrics-server:
      enabled: false

    controller:
      flags:
        on-by-default: false
      resources:
        requests:
          cpu: 25m
          memory: 256Mi

    dashboard:
      replicaCount: 1
      flags:
        on-by-default: false
      resources:
        requests:
          cpu: 25m
          memory: 256Mi
