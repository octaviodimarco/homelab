apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
spec:
  interval: 1h
  chart:
    spec:
      chart: external-dns
      version: "1.21.1"
      sourceRef:
        kind: HelmRepository
        name: external-dns
        # namespace: external-dns

  values:
    tolerations:
      - key: networking-only
        operator: Equal
        value: "true"
        effect: NoSchedule
      - key: networking-only
        operator: Equal
        value: "true"
        effect: NoExecute
  valuesFrom:
    - kind: ConfigMap
      name: external-dns-values
