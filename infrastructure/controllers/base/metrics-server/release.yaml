apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metrics-server
  namespace: metrics-server
spec:
  interval: 30m
  chart:
    spec:
      chart: metrics-server
      version: "3.13.0"
      sourceRef:
        kind: HelmRepository
        name: metrics-server
        namespace: metrics-server
      interval: 12h

  values:
    replicas: 1

    # K3s en nodos NixOS: el kubelet no tiene un cert firmado por una CA que
    # metrics-server reconozca por defecto, así que sin esto el API server
    # rechaza el scrape y la Metrics API queda "sin datos" aunque el pod
    # esté Running.
    args:
      - --kubelet-insecure-tls

    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 128Mi
